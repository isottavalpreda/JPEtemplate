name: Run Precheck

on:
  push:
  workflow_dispatch:

jobs:
  precheck:
    runs-on: [self-hosted, macOS, ARM64]
    if: contains(github.event.head_commit.message, '[trigger remote]') || github.event_name == 'workflow_dispatch'

    env:
      DROPBOX_DOWNLOAD_URL: ${{ secrets.DROPBOX_DOWNLOAD_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Verify environment and packages
        run: |
          if [ -z "$JPE_DBOX_APPS" ] || [ -z "$JULIA_RUNNER_ENV" ]; then
            echo "❌ Required environment variables not set"
            exit 1
          fi
          
          echo "JPE_DBOX_APPS: $JPE_DBOX_APPS"
          echo "JULIA_RUNNER_ENV: $JULIA_RUNNER_ENV"
          
          julia --project=$JULIA_RUNNER_ENV -e '
            using Pkg
            println("=== Julia Environment ===")
            Pkg.status()
            println("\n=== Testing package loads ===")
            using YAML
            println("✓ YAML loaded")
            using PackageScanner
            println("✓ PackageScanner loaded")
            println("\n✓ All required packages available")
          '
      
      - name: Read variables from YAML
        run: |
          julia --project=$JULIA_RUNNER_ENV -e '
            using YAML
            vars = YAML.load_file("_variables.yml")
            for (k,v) in vars
              println("$k=$v")
            end
          ' >> $GITHUB_ENV
      
      - name: Run precheck script
        run: julia --project=$JULIA_RUNNER_ENV runner_precheck.jl
      
      - name: Cap large generated files
        run: |
          MAX_BYTES=$((5 * 1024 * 1024))
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          mkdir -p /tmp/large-generated
          FOUND=false

          for f in generated/*.md; do
            [ -f "$f" ] || continue
            size=$(wc -c < "$f")
            if [ "$size" -gt "$MAX_BYTES" ]; then
              lines=$(wc -l < "$f")
              size_mb=$(awk "BEGIN {printf \"%.1f\", $size/1048576}")
              fname=$(basename "$f")
              cp "$f" "/tmp/large-generated/$fname"
              printf '> **Note**: This list contains %s entries (%s MB) — too large to embed in the report.\n> The full list is available as a GitHub Actions artifact for this run:\n> <%s>\n' \
                "$lines" "$size_mb" "$RUN_URL" > "$f"
              echo "Capped $fname (${size_mb} MB, ${lines} lines)"
              FOUND=true
            fi
          done
          echo "LARGE_GENERATED_EXISTS=$FOUND" >> $GITHUB_ENV

      - name: Upload large generated files as artifacts
        if: env.LARGE_GENERATED_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: large-generated-files
          path: /tmp/large-generated/
          retention-days: 90

      - name: Commit and push results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 prechecks round $round"
            git push origin $GITHUB_REF_NAME
            echo "✓ Results pushed to $GITHUB_REF_NAME"
          fi
      
      - name: Summary
        if: always()
        run: |
          echo "### Precheck Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Paper ID**: $paper_id" >> $GITHUB_STEP_SUMMARY
          echo "- **Round**: $round" >> $GITHUB_STEP_SUMMARY
          echo "- **Journal**: $journal" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
